services:
  cliponomicon:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
      args:
        - VITE_API_URL=${API_URL}
    container_name: cliponomicon
    ports:
      - "8500:80"
    environment:
      - VITE_API_URL=${API_URL}
    depends_on:
      - api-puente
    restart: unless-stopped

  api-puente:
    build:
      context: .
      dockerfile: Dockerfile
      target: bridge
    container_name: api-puente
    ports:
      - "3000:3000"
    env_file:
      - Api_puente/.env
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: unless-stopped