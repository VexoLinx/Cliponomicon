services:
  cliponomicon:
    build:
      context: .
      args:
        # Portainer tomará el valor de su pestaña "ENV" y se lo pasará al Dockerfile
        - VITE_API_URL=${API_URL}
    container_name: cliponomicon
    ports:
      - "8500:80"
    restart: unless-stopped
    networks:
      - proxy_network

    env_file:
      - path: stack.env
        required: false
      - path: .env
        required: false

networks:
  proxy_network:
    external: true
    name: ${PROXY_NETWORK_NAME}
